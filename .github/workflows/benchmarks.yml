name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: 'stable'

permissions:
  contents: read

jobs:
  run-benchmarks:
    name: Run Benchmarks (Ubuntu)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-bench-

      - name: Cache Cargo git
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-bench-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-bench-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Run benchmarks
        run: |
          cd benchmarks
          cargo bench --features stable --nopreview 2>&1 | tee benchmark-output.txt || true

      - name: Upload benchmark output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-output-${{ github.sha }}
          path: |
            benchmarks/benchmark-output.txt
            benchmarks/criterion/
          retention-days: 30

      - name: Upload baseline JSON
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: baseline-v1.7
          path: benchmarks/results/baseline-v1.7.json
          retention-days: 90
