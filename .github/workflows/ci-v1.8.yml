# CI/CD Pipeline v1.8 — Dedicated pipeline for v1.8-sprint1 modules
# Trigger: push to main, pull_request
# Jobs: lint, test, coverage, benchmark-compare, auto-label
# Non-failing: continue-on-error for benchmarks/coverage

name: CI/CD v1.8

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: '1.75'
  V1_8_FEATURE: 'v1.8-sprint1'

permissions:
  contents: read
  pull-requests: write

jobs:
  # ============================================
  # 1. Lint — clippy + rustfmt
  # ============================================
  lint:
    name: Lint (clippy + rustfmt)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo git
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-lint-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: Verify code formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy (stable features)
        run: cargo clippy --features stable -- -D warnings

      - name: Run Clippy (v1.8-sprint1 features)
        run: cargo clippy --features v1.8-sprint1 -- -D warnings

  # ============================================
  # 2. Test — cargo test with v1.8-sprint1
  # ============================================
  test:
    name: Test Suite (v1.8-sprint1)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo git
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-test-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Run cargo check (stable)
        run: cargo check --features stable

      - name: Run cargo check (v1.8-sprint1)
        run: cargo check --features v1.8-sprint1

      - name: Run unit tests (stable)
        run: cargo test --lib --features stable -- --test-threads=4

      - name: Run unit tests (v1.8-sprint1)
        run: cargo test --lib --features v1.8-sprint1 -- --test-threads=4

      - name: Run API Explorer tests
        run: cargo test --lib --features v1.8-sprint1 api::explorer_v1 -- --nocapture
        continue-on-error: true

      - name: Run Reputation Proof Schema tests
        run: cargo test --lib --features v1.8-sprint1 reputation::proof_schema -- --nocapture
        continue-on-error: true

      - name: Run QuantConfig tests
        run: cargo test --lib --features v1.8-sprint1 bridge::quantization -- --nocapture
        continue-on-error: true

  # ============================================
  # 3. Coverage — tarpaulin/grcov (best-effort)
  # ============================================
  coverage:
    name: Coverage (tarpaulin)
    runs-on: ubuntu-latest
    needs: [test]
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install cargo-tarpaulin
        run: |
          cargo install cargo-tarpaulin 2>/dev/null || echo "TODO: install coverage tool"

      - name: Run cargo-tarpaulin (v1.8 modules)
        run: |
          cargo tarpaulin --features v1.8-sprint1 \
            --out Lcov \
            --output-dir coverage \
            --engine Lcov 2>/dev/null || \
          echo "Coverage tool not available — skipping. Install: cargo install cargo-tarpaulin"
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: v1.8-modules
          name: codecov-v1.8
          fail_ci_if_error: false
        continue-on-error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ============================================
  # 4. Benchmark Compare — criterion vs baseline
  # ============================================
  benchmark-compare:
    name: Benchmark Compare (criterion vs baseline)
    runs-on: ubuntu-latest
    needs: [test]
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Run benchmarks (v1.8 modules)
        run: |
          cargo bench --package ed2kIA-benchmarks --features stable 2>&1 | tee benchmark-output.txt || \
          echo "Benchmarks completed with warnings"
        continue-on-error: true
        timeout-minutes: 10

      - name: Compare vs baseline
        run: |
          echo "=== Benchmark Comparison vs baseline-v1.7.json ==="
          if [ -f benchmarks/results/baseline-v1.7.json ]; then
            echo "Baseline found. Manual comparison required."
            cat benchmarks/results/baseline-v1.7.json
          else
            echo "Baseline not found — first run."
          fi
        continue-on-error: true

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-v1.8
          path: |
            benchmark-output.txt
            target/criterion/
          retention-days: 14
        continue-on-error: true

  # ============================================
  # 5. Auto-Label — path-based PR labeling
  # ============================================
  auto-label:
    name: Auto-Label (path-based)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Auto-label based on changed files
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const labels = new Set();

            for (const file of files) {
              const path = file.filename;

              // v1.8 modules
              if (path.includes('api/explorer_v1')) labels.add('v1.8:api-explorer');
              if (path.includes('reputation/proof_schema')) labels.add('v1.8:reputation');
              if (path.includes('bridge/quantization')) labels.add('v1.8:quantization');

              // General categories
              if (path.startsWith('src/')) labels.add('code');
              if (path.startsWith('tests/')) labels.add('tests');
              if (path.startsWith('docs/')) labels.add('docs');
              if (path.startsWith('benchmarks/')) labels.add('benchmarks');
              if (path.startsWith('.github/')) labels.add('ci-cd');
              if (path.startsWith('scripts/')) labels.add('scripts');
              if (path.includes('Cargo.toml')) labels.add('dependencies');
              if (path.includes('.yml') || path.includes('.yaml')) labels.add('config');
            }

            if (labels.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: Array.from(labels)
              });
              console.log(`Added labels: ${Array.from(labels).join(', ')}`);
            } else {
              console.log('No labels to add.');
            }
