name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: '1.75'

permissions:
  contents: write
  packages: write

jobs:
  # ============================================
  # 1. Test - Unit tests + clippy + fmt
  # ============================================
  test:
    name: Test Suite (${{ matrix.os }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ubuntu-latest]
        # Expand for multi-OS: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo git
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: Verify code formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy linter
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run unit tests
        run: cargo test --all-features -- --nocapture

      - name: Run tests with unstable features (optional)
        run: cargo test --all-features --features wasi -- --nocapture
        continue-on-error: true

  # ============================================
  # 2. Cross-Compile - Build for multiple targets
  # ============================================
  cross-compile:
    name: Cross-Compile (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-gnu
          - aarch64-unknown-linux-musl
          - x86_64-pc-windows-msvc
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain with target
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Install cross-compilation tools (Linux musl)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross-compilation tools (ARM64 Linux)
        if: contains(matrix.target, 'aarch64-unknown-linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build for ${{ matrix.target }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ed2kIA-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/ed2kIA
          retention-days: 7

  # ============================================
  # 3. Docker - Build and push container image
  # ============================================
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ============================================
  # 4. Release - Create GitHub Release on tags
  # ============================================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [cross-compile]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize binaries
        run: |
          mkdir -p release-binaries
          for dir in artifacts/ed2kIA-*; do
            if [ -d "$dir" ]; then
              cp "$dir/ed2kIA" "release-binaries/"
              target=$(basename "$dir" | sed 's/ed2kIA-//')
              mv "release-binaries/ed2kIA" "release-binaries/ed2kIA-${target}"
            fi
          done
          cd release-binaries
          for file in *; do
            chmod +x "$file" 2>/dev/null || true
            sha256sum "$file" > "${file}.sha256"
          done

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title "Release ${tag}" \
            --generate-notes \
            release-binaries/*

      - name: Publish to crates.io (optional)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: cargo publish --allow-dirty

  # ============================================
  # 5. Security Audit - Deps vulnerability scan
  # ============================================
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit

  # ============================================
  # 6. Feature Gate Check — Ensure v2.1 features are not in default
  # ============================================
  feature-gate-check:
    name: Feature Gate Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify v2.1 features not in default
        run: |
          # Extract default feature list from Cargo.toml
          DEFAULT_FEATURES=$(grep -A 20 '^default = \[' Cargo.toml | grep '"' | tr -d '", ' | sort)
          # Check that no v2.1-* features are in default
          if echo "$DEFAULT_FEATURES" | grep -q "^v2\.1"; then
            echo "ERROR: v2.1 features found in default feature gate!"
            echo "Features in default: $DEFAULT_FEATURES"
            exit 1
          fi
          echo "PASS: No v2.1 features in default gate"

      - name: Verify default build compiles
        run: cargo check

  # ============================================
  # 7. Voting Script Validation
  # ============================================
  voting-script-validation:
    name: Voting Script Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate voting-tally.sh syntax
        run: bash -n scripts/voting-tally.sh

      - name: Validate security-alert.sh syntax
        run: bash -n scripts/security-alert.sh

  # ============================================
  # 8. Feature Gate Tests — v2.1 feature validation
  # ============================================
  feature-gate-tests:
    name: Feature Gate Tests (v2.1)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        feature:
          - v2.1-observability
          - v2.1-security-hardening
          - v2.1-wasm-browser
          - v2.1-mvp-core
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-v2.1-${{ matrix.feature }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-v2.1-

      - name: cargo check with ${{ matrix.feature }}
        run: cargo check --tests --features ${{ matrix.feature }}

      - name: cargo test with ${{ matrix.feature }}
        run: cargo test --features ${{ matrix.feature }} -- --nocapture
        continue-on-error: false

      - name: cargo bench compile check (no-run)
        run: cargo bench --features ${{ matrix.feature }} --no-run
        continue-on-error: true

  # ============================================
  # 9. CODEOWNERS Sync — Verify protected paths
  # ============================================
  codeowners-sync:
    name: CODEOWNERS Sync Verification
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify CODEOWNERS exists
        run: |
          if [ ! -f .github/CODEOWNERS ]; then
            echo "::error::.github/CODEOWNERS not found"
            exit 1
          fi
          echo "PASS: CODEOWNERS exists"

      - name: Check for protected path changes
        run: |
          # Get changed files in PR
          CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} 2>/dev/null || echo "")

          # Protected paths that require steward review
          PROTECTED_PATTERNS=(
            "docs/governance/"
            "docs/grants/"
            "infra/"
            "tests/integration/"
            "benchmarks/"
            "CHANGELOG.md"
            "Cargo.toml"
            "SECURITY.md"
          )

          FOUND_PROTECTED=false
          for pattern in "${PROTECTED_PATTERNS[@]}"; do
            if echo "$CHANGED_FILES" | grep -q "$pattern"; then
              echo "::warning::Protected path touched: $pattern — steward review required"
              FOUND_PROTECTED=true
            fi
          done

          if [ "$FOUND_PROTECTED" = false ]; then
            echo "INFO: No protected paths touched in this PR"
          fi

  # ============================================
  # 10. WASM Build — Browser Node compilation
  # ============================================
  wasm-build:
    name: WASM Build (Browser Node)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Add wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM with build-wasm.sh
        run: bash scripts/build-wasm.sh

      - name: List WASM artifacts
        run: ls -la dist/wasm/

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-node-wasm
          path: dist/wasm/
          retention-days: 7

  # ============================================
  # 11. MVP Core Validation — v2.1-mvp-core tests
  # ============================================
  mvp-core-validation:
    name: MVP Core Loop Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-mvp-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-mvp-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-

      - name: cargo check --features v2.1-mvp-core
        run: cargo check --features v2.1-mvp-core

      - name: cargo test --features v2.1-mvp-core --lib mvp_core
        run: cargo test --features v2.1-mvp-core --lib mvp_core -- --nocapture

      - name: cargo bench --features v2.1-mvp-core --no-run
        run: cargo bench --features v2.1-mvp-core --no-run
        continue-on-error: true
