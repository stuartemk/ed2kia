name: CI/CD Stable

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # 1. Lint and Check
  check:
    name: Check & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --features stable
      - run: cargo clippy --features stable -- -D warnings

  # 2. Tests
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --features stable
      - run: cargo test --features stable --test final_validation

  # 3. Build Release
  build:
    name: Build Release
    runs-on: ${{ matrix.os }}
    needs: [test]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --features stable --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: ed2kIA-${{ matrix.os }}
          path: target/${{ matrix.target }}/release/

  # 4. Release (on tags)
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - run: |
          bash release/v1.0.0-stable/package_release.sh --dry-run
      - uses: softprops/action-gh-release@v1
        with:
          files: |
            release/v1.0.0-stable/*.tar.gz
            release/v1.0.0-stable/checksums.txt
          body_path: release/v1.0.0-stable/changelog.md
          generate_release_notes: true
