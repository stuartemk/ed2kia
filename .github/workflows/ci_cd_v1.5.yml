name: CI/CD Pipeline v1.5.0 STABLE

on:
  push:
    branches: [main]
    tags: ['v1.5*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: '1.75'
  VERSION: '1.5.0'

permissions:
  contents: write
  packages: write

jobs:
  # ============================================
  # 1. Validate — Stable feature gate
  # ============================================
  validate:
    name: Validate Stable (${{ matrix.os }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-v1.5-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo git
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-v1.5-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-v1.5-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: Verify code formatting
        run: cargo fmt --all -- --check

      - name: cargo check --features stable
        run: cargo check --features stable

      - name: cargo clippy --features stable -- -D warnings
        run: cargo clippy --features stable -- -D warnings

      - name: Run unit tests --features stable
        run: cargo test --features stable

      - name: Run integration tests --features stable
        run: cargo test --features stable --test '*'

      - name: Verify no experimental features in stable
        run: |
          # Ensure stable build does not enable experimental flags
          cargo tree --features stable --edges no-dev | grep -i experimental && exit 1 || true

  # ============================================
  # 2. Sprint 3 Validation
  # ============================================
  sprint3:
    name: Sprint 3 Validation
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy

      - name: cargo check --features v1.5-sprint3
        run: cargo check --features v1.5-sprint3

      - name: cargo clippy --features v1.5-sprint3 -- -D warnings
        run: cargo clippy --features v1.5-sprint3 -- -D warnings

      - name: Run Sprint 3 unit tests
        run: cargo test --features v1.5-sprint3

      - name: Run Sprint 3 E2E tests
        run: cargo test --features v1.5-sprint3 --test v1_5_sprint3_e2e

      - name: Run Sprint 3 stress tests
        run: cargo test --features v1.5-sprint3 --test v1_5_sprint3_stress

  # ============================================
  # 3. Guardrails — Security & Compliance
  # ============================================
  guardrails:
    name: Guardrails Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Check for unsafe code
        run: |
          # Search for unsafe blocks in src/
          if grep -rn "unsafe" src/ --include="*.rs"; then
            echo "ERROR: unsafe code detected in source"
            exit 1
          fi
          echo "PASS: No unsafe code found"

      - name: Check for telemetry
        run: |
          # Search for telemetry/tracking patterns
          if grep -rn "telemetry\|analytics\|tracking\|beacon\|pixel" src/ --include="*.rs" -i; then
            echo "ERROR: telemetry code detected"
            exit 1
          fi
          echo "PASS: No telemetry found"

      - name: Check for financial logic
        run: |
          # Search for financial/monetary patterns
          if grep -rn "payment\|wallet\|token\|coin\|crypto.*price\|exchange.*rate" src/ --include="*.rs" -i; then
            echo "ERROR: financial logic detected"
            exit 1
          fi
          echo "PASS: No financial logic found"

      - name: Security audit (cargo audit)
        run: |
          cargo install cargo-audit --locked 2>/dev/null || true
          cargo audit || echo "WARNING: cargo audit found issues (non-blocking)"

  # ============================================
  # 4. Cross-Compile — Stable targets
  # ============================================
  cross-compile:
    name: Cross-Compile (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: [validate]
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-gnu
          - x86_64-pc-windows-msvc
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain with target
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-v1.5-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Install cross-compilation tools (musl)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross-compilation tools (ARM64)
        if: contains(matrix.target, 'aarch64-unknown-linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release --features stable
        run: cargo build --release --features stable --target ${{ matrix.target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ed2kia-v1.5-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/ed2kia
          retention-days: 14

  # ============================================
  # 5. Docker — Build & Push
  # ============================================
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [validate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=v1.5.0,enable={{is_default_branch}}
            type=raw,value=stable,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            FEATURES=stable
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ============================================
  # 6. Release — GitHub Release on v1.5.* tags
  # ============================================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [cross-compile, guardrails]
    if: startsWith(github.ref, 'refs/tags/v1.5')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize binaries
        run: |
          mkdir -p release-binaries
          for dir in artifacts/ed2kia-v1.5-*; do
            if [ -d "$dir" ]; then
              target=$(basename "$dir" | sed 's/ed2kia-v1.5-//')
              cp "$dir/ed2kia" "release-binaries/ed2kia-${target}"
            fi
          done
          cd release-binaries
          for file in *; do
            chmod +x "$file" 2>/dev/null || true
            sha256sum "$file" > "${file}.sha256"
          done

      - name: Package release artifacts
        run: |
          mkdir -p release-package/docs
          cp -r release-binaries release-package/
          cp docs/migration_guide_v1.4_to_v1.5.md release-package/docs/ 2>/dev/null || true
          cp docs/official_launch_announcement_v1.5.md release-package/docs/ 2>/dev/null || true
          cp docs/architecture_v1.5.0.md release-package/docs/ 2>/dev/null || true
          cp LICENSE release-package/ 2>/dev/null || true
          cp README.md release-package/ 2>/dev/null || true

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title "ed2kIA ${tag} STABLE" \
            --generate-notes \
            release-binaries/*

  # ============================================
  # 7. Documentation — Validate links & structure
  # ============================================
  docs:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify required docs exist
        run: |
          echo "Checking required documentation..."
          test -f docs/architecture_v1.5.0.md || { echo "MISSING: architecture_v1.5.0.md"; exit 1; }
          test -f docs/migration_guide_v1.4_to_v1.5.md || { echo "MISSING: migration_guide_v1.4_to_v1.5.md"; exit 1; }
          test -f docs/official_launch_announcement_v1.5.md || { echo "MISSING: official_launch_announcement_v1.5.md"; exit 1; }
          test -f docs/TRANSPARENCY_FRAMEWORK.md || { echo "MISSING: TRANSPARENCY_FRAMEWORK.md"; exit 1; }
          test -f LICENSE || { echo "MISSING: LICENSE"; exit 1; }
          test -f README.md || { echo "MISSING: README.md"; exit 1; }
          test -f CONTRIBUTING.md || { echo "MISSING: CONTRIBUTING.md"; exit 1; }
          echo "PASS: All required documentation present"

      - name: Verify LICENSE is Apache 2.0
        run: |
          grep -q "Apache License" LICENSE || { echo "ERROR: LICENSE is not Apache 2.0"; exit 1; }
          echo "PASS: LICENSE is Apache 2.0"
