name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: 'stable'

jobs:
  # ============================================
  # Build & Deploy GitHub Pages
  # ============================================
  deploy:
    name: Build WASM + Deploy Pages
    runs-on: ubuntu-latest
    # Note: Create 'github-pages' environment in repo Settings → Environments
    environment:
      name: github-pages
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo git
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build WASM Browser Node
        run: |
          chmod +x scripts/build-wasm.sh
          bash scripts/build-wasm.sh || echo "WASM build skipped (non-fatal)"

      - name: Prepare Pages artifact
        run: |
          mkdir -p docs/pages-dist
          cp -r web/* docs/pages-dist/
          if [ -d "dist/wasm/pkg" ]; then
            cp -r dist/wasm/pkg docs/pages-dist/wasm/
          fi
          echo "ed2kia.github.io/ed2kIA" > docs/pages-dist/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/pages-dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
