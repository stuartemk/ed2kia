name: RFC Triage
on:
  issues:
    types: [opened]

permissions:
  issues: write
  pull-requests: read

jobs:
  triage:
    name: Auto-triage RFC
    runs-on: ubuntu-latest
    if: |
      contains(github.event.issue.labels.*.name, 'rfc') ||
      contains(github.event.issue.labels.*.name, 'RFC') ||
      contains(github.event.issue.labels.*.name, 'RFC-Draft')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate issue format
        id: validate
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';
            const requiredSections = [
              'Motivation',
              'Technical Spec',
              'Ethical Impact',
              'Feature Gate',
              'Validation Checklist'
            ];
            const missing = requiredSections.filter(section =>
              !body.toLowerCase().includes(section.toLowerCase())
            );
            if (missing.length > 0) {
              core.warning(`Missing RFC sections: ${missing.join(', ')}`);
            }
            return missing.length === 0;

      - name: Auto-label RFC
        uses: actions/github-script@v7
        with:
          script: |
            const labels = ['rfc', 'needs-review', 'feature-gate'];
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labels
            });

      - name: Assign milestone
        uses: actions/github-script@v7
        with:
          script: |
            let milestone = null;
            const milestones = await github.rest.issues.listMilestones({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });
            for (const m of milestones.data) {
              if (m.title.includes('v2.1')) {
                milestone = m;
                break;
              }
            }
            if (milestone) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                milestone: milestone.number
              });
            }

      - name: Comment with voting guide
        uses: actions/github-script@v7
        with:
          script: |
            const comment = `## 🛡️ RFC Triage — Voting Guide

            Thank you for submitting this RFC! This issue has been automatically triaged.

            ### Voting Process (Novice → Steward)

            | Tier | Weight | Requirements |
            |------|--------|-------------|
            | Novice | 0.5x | New contributor |
            | Contributor | 1.0x | 5+ merged PRs |
            | Auditor | 1.5x | Passed audit training |
            | Steward | 2.0x | Core team member |

            ### Next Steps

            1. **Discussion Period**: 14-30 days before Core Team review
            2. **Feature Gate**: Ensure your RFC includes a feature gate
            3. **Ethical Review**: All RFCs must include an Ethical Impact section
            4. **Validation**: Complete the validation checklist before merging

            ### Resources

            - [GOVERNANCE.md](../../blob/main/GOVERNANCE.md) — Governance rules
            - [RFC Template](../../blob/main/.github/ISSUE_TEMPLATE/rfc-proposal.md)
            - [Feature Gates](../../blob/main/Cargo.toml)

            ---
            *Auto-generated by RFC Triage Workflow*
            `;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
