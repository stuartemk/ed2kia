# Security Monitor — Automated weekly dependency vulnerability scan
# Trigger: Mondays 03:00 UTC + manual dispatch
# License: Apache 2.0 + Ethical Use Clause

name: Security Monitor

on:
  schedule:
    - cron: '0 3 * * 1'  # Mondays 03:00 UTC
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: '1.75'

permissions:
  contents: write

jobs:
  # ============================================
  # 1. Security Scan — cargo audit + outdated
  # ============================================
  security-scan:
    name: Security Scan & Report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Verify compilation baseline
        run: cargo check --all-targets

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: |
          cargo audit --output json > audit-results.json 2>&1 || true
          cargo audit > audit-results.txt 2>&1 || true
        continue-on-error: true

      - name: Install cargo-outdated
        run: cargo install cargo-outdated

      - name: Run cargo outdated
        run: |
          cargo outdated --root-deps-only --output json > outdated-results.json 2>&1 || true
          cargo outdated --root-deps-only > outdated-results.txt 2>&1 || true
        continue-on-error: true

      - name: Generate weekly report
        run: |
          cat > docs/reports/security-monitor-weekly.md << 'REPORT'
          # Security Monitor — Weekly Report

          **Generated:** DATE_PLACEHOLDER
          **Commit:** COMMIT_PLACEHOLDER
          **Branch:** main

          ---

          ## 1. CVE Summary

          | Severity | Count | Status |
          |----------|-------|--------|
          | CRITICAL | 0 | Scanning... |
          | HIGH | 0 | Scanning... |
          | MEDIUM | 0 | Scanning... |
          | LOW | 0 | Scanning... |

          ## 2. New CVEs Since Last Scan

          | ID | Crate | Severity | Title | Mitigation |
          |----|-------|----------|-------|------------|
          | — | — | — | No new CVEs detected | — |

          ## 3. Outdated Dependencies

          | Crate | Current | Latest | Kind |
          |-------|---------|--------|------|
          | — | — | — | — |

          ## 4. Unmaintained Dependencies

          | Crate | Version | Last Release | Risk |
          |-------|---------|--------------|------|
          | — | — | — | — |

          ## 5. Alerts

          - No critical alerts this week

          ## 6. Action Items

          - [ ] Review new CVEs (if any)
          - [ ] Update remediation plan if needed
          - [ ] Escalate critical findings to stewards

          ---

          *Auto-generated by Security Monitor workflow*
          *Next scan: 7 days*
          REPORT

          # Replace placeholders
          sed -i "s/DATE_PLACEHOLDER/$(date -u +%Y-%m-%dT%H:%M:%SZ)/" docs/reports/security-monitor-weekly.md
          sed -i "s/COMMIT_PLACEHOLDER/$(git rev-parse --short HEAD)/" docs/reports/security-monitor-weekly.md

      - name: Upload audit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: |
            audit-results.json
            audit-results.txt
            outdated-results.json
            outdated-results.txt
          retention-days: 30

      - name: Commit report if changed
        run: |
          git config user.name "ed2kIA-security-bot"
          git config user.email "security@ed2kIA.bot"
          git add docs/reports/security-monitor-weekly.md
          if ! git diff --cached --quiet; then
            git commit -m "chore(security): update weekly security monitor report"
            git push origin main
          else
            echo "No changes to commit"
          fi
