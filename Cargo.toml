[package]
name = "ed2kia"
version = "12.0.0-sprint120"
edition = "2021"
description = "Decentralized distributed interpretability network using Sparse Autoencoders (Qwen-Scope)"
license = "Apache-2.0"
authors = ["ed2kIA Contributors"]
repository = "https://github.com/ed2kia/ed2kia"
readme = "README.md"
keywords = ["p2p", "sae", "interpretability", "distributed-ml", "libp2p"]
categories = ["network-programming", "command-line-utilities"]

# Apache 2.0 + Ethical Use Clause
# This software is provided for the benefit of humanity and responsible AI development.
# It must be used transparently, auditable, free of backdoors, and compatible with voluntary global infrastructure.

[dependencies]
# Async runtime
tokio = { version = "1.38", features = ["full"] }
async-trait = "0.1"
futures = "0.3"

# P2P - libp2p
libp2p = { version = "0.53", features = ["identify", "kad", "mdns", "request-response", "gossipsub", "plaintext", "tcp", "noise", "yamux", "cbor", "tokio"], optional = true }
libp2p-identity = { version = "0.2", features = ["secp256k1"] }

# Serialization
prost = "0.12"
flatbuffers = "23.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"

# ML / Candle
candle-core = "0.6"
candle-nn = "0.6"
safetensors = "0.3"

# Pin half to 2.4.x to avoid rand 0.9 conflict (candle-core 0.6 needs rand 0.8)
half = ">=2.4, <2.5"

# CLI & Config
clap = { version = "4.5", features = ["derive"] }
dirs = "5.0"
config = "0.13"

# Logging & Telemetry
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Utils
hex = "0.4"
num_cpus = "1.16"
bytemuck = { version = "1.14", features = ["extern_crate_alloc"] }
sha2 = "0.10"
uuid = { version = "1.7", features = ["v4", "serde"] }
thiserror = "1.0"
anyhow = "1.0"
once_cell = "1.19"
parking_lot = "0.12"

# WASM Sandbox - Fase 3
wasmtime = { version = "17.0", default-features = false, features = ["cranelift"], optional = true }

# ZKP - Fase 3
ark-ec = "0.4"
ark-ff = "0.4"
ark-std = "0.4"
ark-bn254 = "0.4"
ark-serialize = "0.4"

# Human-in-the-loop - Fase 3
crossterm = "0.27"

# Web UI - Fase 4
axum = { version = "0.7", features = ["json", "ws"] }
tower-http = { version = "0.5", features = ["fs", "trace"] }

# Embedded DB - Fase 4
redb = "1.5"

# Monitoring - Fase 4
prometheus = "0.13"
lazy_static = "1.4"

# Dashmap - thread-safe concurrent HashMap for session management
dashmap = "6.0"

# Graph - Semantic Atlas (v2.1-atlas)
petgraph = "0.6"

# Governance - Fase 5
ed25519-dalek = { version = "2.1", features = ["rand_core"] }
chrono = { version = "0.4", features = ["serde"] }

# Ecosystem Sync - Fase 5
reqwest = { version = "0.11", features = ["json", "stream"] }

# Bootstrap - Fase 5
fastrand = "2.1"

# CLI Wizard - dialoguer (Sprint15 â€” v2.1-operator-cli)
dialoguer = { version = "0.11", optional = true }
env_logger = { version = "0.11", optional = true }

# Property-based fuzzing (Sprint13 â€” v2.1-fuzzing)
proptest = { version = "1.5", optional = true }

# QLoRA/GGUF (Sprint16.1 â€” v2.1-qlora-gguf)
memmap2 = { version = "0.9", optional = true }
zstd = { version = "0.13", optional = true }

# WASM Browser Node dependencies (optional, feature-gated)
wasm-bindgen = { version = "0.2", optional = true }
wasm-bindgen-futures = { version = "0.4", optional = true }
js-sys = { version = "0.3", optional = true }
web-sys = { version = "0.3", features = ["Worker", "WorkerGlobalScope", "WorkerOptions", "MessagePort", "MessageEvent", "Navigator", "Window", "CustomEvent", "Event", "EventInit", "EventTarget", "Url", "Blob"], optional = true }

# Cross-platform
[target.'cfg(target_os = "windows")'.dependencies]
windows = { version = "0.52", features = ["Win32_System_Console"] }

# WASM Browser Node â€” v2.1-wasm-browser (wasm32-unknown-unknown target)
# Note: These are optional and only activated via feature flags.
# On wasm32 target, getrandom requires "js" feature.
[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.2", features = ["js"] }
# Sprint 41: WASM/Edge Integration â€” Resonance Interface & Browser Node
wasm-bindgen = "0.2"
js-sys = "0.3"
web-sys = { version = "0.3", features = ["AudioContext", "OscillatorNode", "GainNode", "Worker", "MessageEvent"] }

[features]
default = []
p2p = ["dep:libp2p"]
wasm = ["dep:wasmtime"]
cuda = ["candle-core/cuda"]
[[test]]
name = "moral_manifold_behavior"
path = "tests/moral_manifold_behavior.rs"
required-features = ["v3.2-genesis-manifold"]

# Sprint 51 Test: RSSI Controlled Evolution
[[test]]
name = "rssi_controlled_evolution"
path = "tests/rssi_controlled_evolution.rs"
required-features = ["v3.3-rssi-evolution"]

# Sprint 52 Test: Macro Symbiosis E2E
[[test]]
name = "macro_symbiosis_e2e"
path = "tests/macro_symbiosis_e2e.rs"
required-features = ["v3.4-macro-symbiosis"]

# Sprint 53 Test: Planetary Emergence E2E
[[test]]
name = "planetary_emergence_e2e"
path = "tests/planetary_emergence_e2e.rs"
required-features = ["v3.5-planetary-emergence"]

# Sprint 54 Test: Symbiotic Aegis E2E
[[test]]
name = "symbiotic_aegis_e2e"
path = "tests/symbiotic_aegis_e2e.rs"
required-features = ["v3.6-aegis-resonance"]

# Sprint 69: Testnet Stress Tests â€” Fault tolerance, shard redistribution, workload scheduler
[[test]]
name = "testnet_stress"
path = "tests/integration/testnet_stress.rs"
required-features = ["v9.5-testnet-hardening"]

# Sprint 43: Corpuscular Bridge Implementation & IoT/CE Exchange Protocol
# src/pillars/corpuscular/iot_adapter.rs: LocalHardwareAdapter â€” LOCAL_ONLY device registry
# src/pillars/corpuscular/ce_exchange.rs: CEExchangeEngine â€” CE â†” Physical Resource atomic exchange
# (Dependencies declared in Sprint 40 entry above: v3.0-pillar-messaging + v3.0-orchestration)

[dev-dependencies]
tempfile = "3.10"
criterion = { version = "0.5", features = ["html_reports"] }
tower = { version = "0.5", features = ["util"] }
# WASM encoder for generating valid test modules
wasm-encoder = "0.248"


[build-dependencies]
prost-build = "0.12"

[[bin]]
name = "ed2kia"
path = "src/main.rs"

[[bin]]
name = "ed2kia-cli"
path = "src/bin/ed2kia-cli.rs"
required-features = ["v2.1-operator-cli"]

[[bin]]
name = "ed2kia-onboard"
path = "src/bin/ed2kia-onboard.rs"
required-features = ["v2.1-community-onboarding"]

[[bin]]
name = "ed2k_mvp"
path = "src/bin/ed2k_mvp.rs"
required-features = ["v2.1-mvp-simulation"]

[lib]
name = "ed2kia"
path = "src/lib.rs"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true

[profile.dev]
opt-level = 0
debug = true

# Stress test for load testing (tests/load/) â€” feature-gated v2.1-load-testing
[[test]]
name = "stress_test"
path = "tests/load/stress_test.rs"
required-features = ["v2.1-load-testing"]

