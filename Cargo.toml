# Technical Resource Pools, DAO Ledger v2, Async ZKP v4, UI Dashboard v4
"v1.3-sprint2" = []
# SAE Fine-Tuning v3, Federation Scaling v3, Async ZKP v5 & Final Consolidation
"v1.3-sprint3" = []

# ─── v1.4.0 Sprint 1 Features (Production Foundation) ───
# Halo2 ZKP Engine, Tokio Async Optimization, LZ4 Compression, Advanced Metrics
"v1.4-sprint1" = []

# ─── v1.4.0 Sprint 2 Features (Development) ───
# Cross-Chain Pools v3, DAO Ledger v4, Async ZKP v7, UI Dashboard v5
"v1.4-sprint2" = []

# ─── v1.4.0 Sprint 3 Features (Final) ───
# SAE Fine-Tuning v4, Federation Scaling v4, Async ZKP v8, Final Consolidation
"v1.4-sprint3" = []

# ─── Sprint20: Stuartian Geometry 3D & 3D Visualization ───
"v2.1-stuartian-geometry" = ["v2.1-sct-core"]

"v2.1-3d-viz" = ["v2.1-stuartian-geometry"]

# ─── Sprint21: Interoperabilidad P2P & Escalado Federado ───
"v2.1-cross-mesh" = []

"v2.1-region-sync" = []

"v2.1-federation-bootstrap" = ["v2.1-cross-mesh", "v2.1-region-sync"]

# ─── Sprint22: Mainnet Genesis & Steward Activation ───

# v2.1 Mainnet Genesis — Deterministic genesis state, Ed25519 signing, dual export (Sprint22)
# src/mainnet/genesis.rs: GenesisState with SHA256 hash + Ed25519 signature
# scripts/genesis-bootstrap.sh: 5-phase automated bootstrap
"v2.1-mainnet-genesis" = []

# v2.1 Steward Portal — Alpine.js operations dashboard, merit-verified access (Sprint22)
# web/steward-portal.html: Genesis verification, network health, steward actions
# web/assets/steward-portal.js: Alpine.js component with polling + debounce
"v2.1-steward-portal" = ["v2.1-mainnet-genesis"]

# ─── Sprint23: End-to-End Local MVP (La Chispa) ───

# v2.1 MVP Simulation — 3-node local testnet, SCT Hard Reject demo, BFT consensus (Sprint23)
# src/mvp/sae_simulator.rs: Dummy SAE payload generator (Symbiotic/Perverse profiles)
# src/mvp/consensus_runner.rs: SCT Guard + BFT Aggregator execution
# src/mvp/local_testnet.rs: 5-phase simulation orchestrator
# src/bin/ed2k_mvp.rs: CLI binary with --dry-run, --verbose, --output-json
"v2.1-mvp-simulation" = ["v2.1-sct-core", "v2.1-sct-guard", "v2.1-bft-aggregation"]

[dev-dependencies]
tempfile = "3.10"
criterion = { version = "0.5", features = ["html_reports"] }
tower = { version = "0.5", features = ["util"] }
# WASM encoder for generating valid test modules
wasm-encoder = "0.248"


[build-dependencies]
prost-build = "0.12"

[[bin]]
name = "ed2kia"
path = "src/main.rs"

[[bin]]
name = "ed2kia-cli"
path = "src/bin/ed2kia-cli.rs"
required-features = ["v2.1-operator-cli"]

[[bin]]
name = "ed2kia-onboard"
path = "src/bin/ed2kia-onboard.rs"
required-features = ["v2.1-community-onboarding"]

[[bin]]
name = "ed2k_mvp"
path = "src/bin/ed2k_mvp.rs"
required-features = ["v2.1-mvp-simulation"]

[lib]
name = "ed2kia"
path = "src/lib.rs"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true

[profile.dev]
opt-level = 0
debug = true

# Stress test for load testing (tests/load/) — feature-gated v2.1-load-testing
