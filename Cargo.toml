[package]
name = "ed2kia"
version = "2.1.0-sprint24"
edition = "2021"
description = "Descentralized distributed interpretability network using Sparse Autoencoders (Qwen-Scope)"
license = "Apache-2.0"
authors = ["ed2kIA Contributors"]
repository = "https://github.com/ed2kia/ed2kia"
readme = "README.md"
keywords = ["p2p", "sae", "interpretability", "distributed-ml", "libp2p"]
categories = ["network-programming", "command-line-utilities"]

# Apache 2.0 + Ethical Use Clause
# This software is provided for the benefit of humanity and responsible AI development.
# It must be used transparently, auditable, free of backdoors, and compatible with voluntary global infrastructure.

[dependencies]
# Async runtime
tokio = { version = "1.38", features = ["full"] }
async-trait = "0.1"
futures = "0.3"

# P2P - libp2p
libp2p = { version = "0.53", features = ["identify", "kad", "mdns", "request-response", "gossipsub", "plaintext", "tcp", "noise", "yamux", "cbor", "tokio"] }
libp2p-identity = { version = "0.2", features = ["secp256k1"] }

# Serialization
prost = "0.12"
flatbuffers = "23.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"

# ML / Candle
candle-core = "0.6"
candle-nn = "0.6"
safetensors = "0.3"

# Pin half to 2.4.x to avoid rand 0.9 conflict (candle-core 0.6 needs rand 0.8)
half = ">=2.4, <2.5"

# CLI & Config
clap = { version = "4.5", features = ["derive"] }
dirs = "5.0"
config = "0.13"

# Logging & Telemetry
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Utils
hex = "0.4"
num_cpus = "1.16"
bytemuck = { version = "1.14", features = ["extern_crate_alloc"] }
sha2 = "0.10"
uuid = { version = "1.7", features = ["v4", "serde"] }
thiserror = "1.0"
anyhow = "1.0"
once_cell = "1.19"
parking_lot = "0.12"

# WASM Sandbox - Fase 3
wasmtime = { version = "17.0", default-features = false, features = ["cranelift"] }

# ZKP - Fase 3
ark-ec = "0.4"
ark-ff = "0.4"
ark-std = "0.4"
ark-bn254 = "0.4"
ark-serialize = "0.4"

# Human-in-the-loop - Fase 3
crossterm = "0.27"

# Web UI - Fase 4
axum = { version = "0.7", features = ["json", "ws"] }
tower-http = { version = "0.5", features = ["fs", "trace"] }

# Embedded DB - Fase 4
redb = "1.5"

# Monitoring - Fase 4
prometheus = "0.13"
lazy_static = "1.4"

# Dashmap - thread-safe concurrent HashMap for session management
dashmap = "6.0"

# Graph - Semantic Atlas (v2.1-atlas)
petgraph = "0.6"

# Governance - Fase 5
ed25519-dalek = { version = "2.1", features = ["rand_core"] }
chrono = { version = "0.4", features = ["serde"] }

# Ecosystem Sync - Fase 5
reqwest = { version = "0.11", features = ["json", "stream"] }

# Bootstrap - Fase 5
fastrand = "2.1"

# CLI Wizard - dialoguer (Sprint15 — v2.1-operator-cli)
dialoguer = { version = "0.11", optional = true }
env_logger = { version = "0.11", optional = true }

# Property-based fuzzing (Sprint13 — v2.1-fuzzing)
proptest = { version = "1.5", optional = true }

# QLoRA/GGUF (Sprint16.1 — v2.1-qlora-gguf)
memmap2 = { version = "0.9", optional = true }
zstd = { version = "0.13", optional = true }

# WASM Browser Node dependencies (optional, feature-gated)
wasm-bindgen = { version = "0.2", optional = true }
wasm-bindgen-futures = { version = "0.4", optional = true }
js-sys = { version = "0.3", optional = true }
web-sys = { version = "0.3", features = ["Worker", "WorkerGlobalScope", "WorkerOptions", "MessagePort", "MessageEvent", "Navigator", "Window", "CustomEvent", "Event", "EventInit", "EventTarget", "Url", "Blob"], optional = true }

# Cross-platform
[target.'cfg(target_os = "windows")'.dependencies]
windows = { version = "0.52", features = ["Win32_System_Console"] }

# WASM Browser Node — v2.1-wasm-browser (wasm32-unknown-unknown target)
# Note: These are optional and only activated via feature flags.
# On wasm32 target, getrandom requires "js" feature.
[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.2", features = ["js"] }

[features]
# CONSOLIDATION: v1.0.0 stable feature structure
# `default` enables all stable modules (Fases 1-9 unified)
default = ["stable"]

# ─── Stable Features (Production) ───
# `stable` enables all validated modules from Fases 1-9
# Includes legacy feature flags for backward compatibility
stable = [
    "phase6-core",
    "phase6-sprint2",
    "phase6-experimental",
    "phase7-sprint1",
    "phase7-sprint2",
    "phase8-sprint1",
    "phase8-sprint2",
    "phase9-sprint1",
