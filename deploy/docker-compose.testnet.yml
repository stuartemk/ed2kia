# ed2kIA Testnet — Hostile Network Simulation (Sprint 84: v9.20.0)
# 5-node distributed SAE network with latency/packet loss simulation via tc/netem
# Usage: docker compose -f deploy/docker-compose.testnet.yml up -d

version: "3.9"

services:
  # Bootstrap/Coordinator node
  ed2k-node-0:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ed2k-node-0
    environment:
      - ED2K_NODE_ID=0
      - ED2K_LISTEN_ADDR=0.0.0.0:8080
      - ED2K_BOOTSTRAP=/dns4/ed2k-node-0/tcp/8080
      - ED2K_LOG_LEVEL=info
      - ED2K_FEATURE_FLAG=stable-core
    ports:
      - "8080:8080"
    volumes:
      - ed2k-data-0:/data/ed2k
    networks:
      - ed2k-testnet
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Worker node 1
  ed2k-node-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ed2k-node-1
    environment:
      - ED2K_NODE_ID=1
      - ED2K_LISTEN_ADDR=0.0.0.0:8081
      - ED2K_BOOTSTRAP=/dns4/ed2k-node-0/tcp/8080
      - ED2K_LOG_LEVEL=info
      - ED2K_FEATURE_FLAG=stable-core
    ports:
      - "8081:8081"
    volumes:
      - ed2k-data-1:/data/ed2k
    networks:
      - ed2k-testnet
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Worker node 2
  ed2k-node-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ed2k-node-2
    environment:
      - ED2K_NODE_ID=2
      - ED2K_LISTEN_ADDR=0.0.0.0:8082
      - ED2K_BOOTSTRAP=/dns4/ed2k-node-0/tcp/8080
      - ED2K_LOG_LEVEL=info
      - ED2K_FEATURE_FLAG=stable-core
    ports:
      - "8082:8082"
    volumes:
      - ed2k-data-2:/data/ed2k
    networks:
      - ed2k-testnet
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Worker node 3
  ed2k-node-3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ed2k-node-3
    environment:
      - ED2K_NODE_ID=3
      - ED2K_LISTEN_ADDR=0.0.0.0:8083
      - ED2K_BOOTSTRAP=/dns4/ed2k-node-0/tcp/8080
      - ED2K_LOG_LEVEL=info
      - ED2K_FEATURE_FLAG=stable-core
    ports:
      - "8083:8083"
    volumes:
      - ed2k-data-3:/data/ed2k
    networks:
      - ed2k-testnet
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Worker node 4
  ed2k-node-4:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ed2k-node-4
    environment:
      - ED2K_NODE_ID=4
      - ED2K_LISTEN_ADDR=0.0.0.0:8084
      - ED2K_BOOTSTRAP=/dns4/ed2k-node-0/tcp/8080
      - ED2K_LOG_LEVEL=info
      - ED2K_FEATURE_FLAG=stable-core
    ports:
      - "8084:8084"
    volumes:
      - ed2k-data-4:/data/ed2k
    networks:
      - ed2k-testnet
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Network emulation — tc/netem for latency and packet loss
  # Note: Requires host-level tc access. Run deploy_testnet.sh for full setup.
  netem-sim:
    image: ghusta/netem:latest
    container_name: netem-sim
    network_mode: host
    cap_add:
      - NET_ADMIN
    command: >
      bash -c '
        echo "Applying netem rules..."
        tc qdisc add dev eth0 root netem delay 250ms 50ms distribution normal loss 3% 2>/dev/null || true
        echo "Latency: 250ms ± 50ms, Packet loss: 3%"
        echo "Run: tc qdisc show dev eth0 to verify"
        sleep infinity
      '
    restart: unless-stopped

volumes:
  ed2k-data-0:
  ed2k-data-1:
  ed2k-data-2:
  ed2k-data-3:
  ed2k-data-4:

networks:
  ed2k-testnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
