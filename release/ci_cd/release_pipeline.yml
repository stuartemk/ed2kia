# GitHub Actions: ed2kIA Release Pipeline
# Workflow: Merge → Test → Build → Canary Deploy → Monitor → Promote
# Trigger: Push to release/v0.6.0 branch or manual dispatch

name: Release Pipeline v0.6.0-RC

on:
  push:
    branches: [release/v0.6.0]
  workflow_dispatch:
    inputs:
      phase:
        description: "Rollout phase"
        required: true
        default: "canary"
        type: choice
        options:
          - canary
          - expand
          - full
          - rollback
      target_percentage:
        description: "Target deployment percentage"
        required: false
        default: "10"
        type: number

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CARGO_TERM_COLOR: always

permissions:
  contents: read
  packages: write
  deployments: write

jobs:
  # ============================================================
  # JOB 1: Lint & Static Analysis
  # ============================================================
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (core-only)
        run: cargo clippy --no-default-features --features "core-only" -- -D warnings

      - name: Clippy (phase6-sprint2)
        run: cargo clippy --features "phase6-sprint2" -- -D warnings

      - name: Clippy (full phase6)
        run: cargo clippy --features "phase6-core,phase6-sprint2,phase6-experimental" -- -D warnings

  # ============================================================
  # JOB 2: Test Suite
  # ============================================================
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      matrix:
        feature-set:
          - "core-only"
          - "phase6-sprint2"
          - "phase6-core,phase6-sprint2,phase6-experimental"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests (features: ${{ matrix.feature-set }})
        run: cargo test --features "${{ matrix.feature-set }}" -- --test-threads=4

      - name: Run doc tests
        run: cargo test --doc --features "${{ matrix.feature-set }}"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.feature-set }}
          path: target/test-results/
          retention-days: 7

  # ============================================================
  # JOB 3: Build Multi-Architecture Binaries
  # ============================================================
  build-multiarch:
    name: Build (${{ matrix.target.arch }})
    runs-on: ${{ matrix.target.os }}
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        target:
          - os: ubuntu-latest
            arch: amd64
            rust_target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            arch: arm64
            rust_target: aarch64-unknown-linux-gnu
          - os: windows-latest
            arch: amd64
            rust_target: x86_64-pc-windows-msvc
          - os: macos-latest
            arch: amd64
            rust_target: x86_64-apple-darwin
          - os: macos-latest
            arch: arm64
            rust_target: aarch64-apple-darwin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target.rust_target }}

      - name: Build release binary
        run: |
          cargo build --release --target ${{ matrix.target.rust_target }} \
            --features "phase6-sprint2"

      - name: Strip binary (Linux)
        if: runner.os == 'Linux'
        run: strip target/${{ matrix.target.rust_target }}/release/ed2kia

      - name: Create tarball
        run: |
          cd target/${{ matrix.target.rust_target }}/release
          tar czf ed2kia-v0.6.0-rc-${{ matrix.target.arch }}.tar.gz ed2kia
          sha256sum ed2kia-v0.6.0-rc-${{ matrix.target.arch }}.tar.gz > checksums.txt

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ed2kia-v0.6.0-rc-${{ matrix.target.arch }}
          path: target/${{ matrix.target.rust_target }}/release/ed2kia-v0.6.0-rc-${{ matrix.target.arch }}.tar.gz
          retention-days: 30

      - name: Build Docker image
        if: runner.os == 'Linux'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v0.6.0-rc-${{ matrix.target.arch }}
          platforms: linux/${{ matrix.target.arch }}
          load: true

  # ============================================================
  # JOB 4: Canary Deployment
  # ============================================================
  canary-deploy:
    name: Canary Deploy (10%)
    runs-on: ubuntu-latest
    needs: [build-multiarch]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.phase == 'canary'
    environment: production-canary
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ed2kia-v0.6.0-rc-*
          path: artifacts/

      - name: Generate checksums
        run: |
          cd artifacts
          for f in */*.tar.gz; do
            sha256sum "$f"
          done > ../checksums.txt

      - name: Deploy to seed nodes
        run: |
          echo "Deploying v0.6.0-RC to seed nodes (10%)"
          # In production, this would:
          # 1. SSH to seed nodes
          # 2. Backup current binary
          # 3. Deploy new binary
          # 4. Restart service
          # 5. Verify health endpoint
          echo "Canary deployment initiated"

      - name: Verify deployment
        run: |
          echo "Verifying canary deployment..."
          # Check health endpoints of seed nodes
          # curl -f http://seed-node-1:3030/api/v2/health
          # curl -f http://seed-node-2:3030/api/v2/health
          echo "Canary deployment verified"

      - name: Notify success
        if: success()
        run: echo "✅ Canary deployment successful. Monitoring for 24h."

      - name: Notify failure
        if: failure()
        run: echo "❌ Canary deployment failed. Initiating rollback."

  # ============================================================
  # JOB 5: Monitor 24h
  # ============================================================
  monitor-24h:
    name: Monitor 24h
    runs-on: ubuntu-latest
    needs: [canary-deploy]
    if: always() && needs.canary-deploy.result == 'success'
    steps:
      - name: Wait 24 hours
        run: sleep 86400

      - name: Check metrics
        run: |
          echo "Checking 24h metrics..."
          # Verify:
          # - Consensus participation ≥ 85%
          # - SAE latency p95 ≤ 400ms
          # - API error rate < 0.5%
          # - No node crashes
          echo "24h monitoring complete"

  # ============================================================
  # JOB 6: Promote to Stable
  # ============================================================
  promote-to-stable:
    name: Promote to v0.6.0 STABLE
    runs-on: ubuntu-latest
    needs: [monitor-24h]
    if: always() && needs.monitor-24h.result == 'success'
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create git tag
        run: |
          git tag -a v0.6.0 -m "Release v0.6.0 STABLE"
          git push origin v0.6.0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v0.6.0
          name: "ed2kIA v0.6.0 STABLE"
          body_path: docs/RELEASE_NOTES_v0.6.0-RC.md
          files: |
            artifacts/*/*.tar.gz
            checksums.txt
          draft: false
          prerelease: false

      - name: Update main branch
        run: |
          git checkout main
          git merge release/v0.6.0 --no-edit
          git push origin main

      - name: Notify community
        run: echo "🎉 ed2kIA v0.6.0 STABLE released!"

  # ============================================================
  # JOB 7: Rollback (on demand)
  # ============================================================
  rollback:
    name: Rollback to v0.5.0
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.phase == 'rollback'
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Execute rollback
        run: |
          echo "Initiating rollback to v0.5.0 STABLE..."
          # Run rollback script on all nodes
          # ./ops/rollback_v0.6.0.sh
          echo "Rollback complete"

      - name: Verify rollback
        run: |
          echo "Verifying v0.5.0 is active..."
          # Check health endpoints
          # curl -f http://seed-node-1:3030/api/v1/health
          echo "Rollback verified"

      - name: Notify
        run: echo "⚠️ Rolled back to v0.5.0 STABLE. Incident review required."
