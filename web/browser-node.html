<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ed2kIA — Browser Node</title>
    <style>
        body { font-family: monospace; background: #1a1a2e; color: #e0e0e0; padding: 2rem; }
        #status { color: #00ff88; }
        #error { color: #ff4444; }
        #telemetry-log {
            margin-top: 1rem;
            padding: 1rem;
            background: #0a0a1a;
            border: 1px solid #333;
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.85rem;
        }
        .telemetry-entry {
            padding: 0.25rem 0;
            border-bottom: 1px solid #222;
        }
        .telemetry-entry:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <h1>ed2kIA Browser Node</h1>
    <div id="counters">
        <span id="task-count">Tasks: 0</span> |
        <span id="peer-count">Peers: 0</span> |
        <span id="error-count">Errors: 0</span>
    </div>
    <p id="status">Initializing...</p>
    <div id="telemetry-log"></div>
    <script src="browser_node.js"></script>
    <script>
        // v2.1-wasm-telemetry: Reactive event listeners for all telemetry events
        (function() {
            var log = document.getElementById('telemetry-log');
            var entryCount = 0;
            var tasks = 0, peers = 0, errors = 0;
            var taskEl = document.getElementById('task-count');
            var peerEl = document.getElementById('peer-count');
            var errorEl = document.getElementById('error-count');

            function addEntry(prefix, detail) {
                entryCount++;
                var entry = document.createElement('div');
                entry.className = 'telemetry-entry';
                entry.textContent = '[' + entryCount + '] ' + prefix + ': ' + JSON.stringify(detail);
                if (log.firstChild) {
                    log.insertBefore(entry, log.firstChild);
                } else {
                    log.appendChild(entry);
                }
                while (log.children.length > 50) {
                    log.removeChild(log.lastChild);
                }
            }

            // task_received — fired when audit task is dispatched to worker
            document.addEventListener('task_received', function(e) {
                tasks++;
                if (taskEl) taskEl.textContent = 'Tasks: ' + tasks;
                addEntry('TASK', e.detail || {});
            });

            // inference_complete — fired when SAE inference finishes
            document.addEventListener('inference_complete', function(e) {
                addEntry('INF', e.detail || {});
            });

            // peer_connected — fired when P2P peer connects via WebRTC
            document.addEventListener('peer_connected', function(e) {
                peers++;
                if (peerEl) peerEl.textContent = 'Peers: ' + peers;
                addEntry('PEER', e.detail || {});
            });

            // wasm_error — fired on runtime errors from WASM
            document.addEventListener('wasm_error', function(e) {
                errors++;
                if (errorEl) errorEl.textContent = 'Errors: ' + errors;
                addEntry('ERR', e.detail || {});
            });
        })();
    </script>
</body>
</html>
